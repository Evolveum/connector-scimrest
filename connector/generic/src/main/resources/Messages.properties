rest.developmentMode.display=Development Mode
rest.developmentMode.help=Enable development mode

restAddressBase.help=Base URL of the REST API endpoint (e.g. https://api.example.com/v1)
restAddressTest.help=Relative path used to verify connectivity on test() (e.g. /health)
sslTrustAll.help=Disable TLS certificate validation. Use only in development environments.
restTimeoutSeconds.help=HTTP request timeout in seconds. Defaults to 30 if not set.

restBasicUsername.help=Username for HTTP Basic authentication
restBasicPassword.help=Password for HTTP Basic authentication

restTokenValue.help=Static bearer token sent in the Authorization header
restTokenName.help=Prefix placed before the token value in the Authorization header (e.g. Bearer)
restTokenJwtAlgorithm.help=JWT signing algorithm: HS256/384/512 for HMAC, RS256/384/512 or PS256/384/512 for RSA, ES256/384/512 for ECDSA
restTokenJwtSecret.help=HMAC secret or PEM-encoded PKCS#8 private key used to sign the JWT
restTokenJwtSecretBase64.help=When enabled, the HMAC secret is Base64-decoded before signing
restTokenJwtPayload.help=JSON object with additional claims to include in the JWT payload
restTokenJwtLocation.help=Where to place the JWT in the request: header (default) or query parameter

restApikeyValue.help=API key value sent with each request
restApikeyName.help=Name of the header or query parameter carrying the API key (e.g. X-API-Key, api_key)
restApikeyLocation.help=Where to place the API key: header or query

restOAuth2TokenUrl.help=URL of the OAuth2 authorization server token endpoint
restOAuth2ClientId.help=Client identifier issued by the authorization server
restOAuth2ClientSecret.help=Client secret (required for client_credentials grant type)
restOAuth2PrivateKey.help=PEM-encoded PKCS#8 private key for JWT Bearer grant type (RFC 7523)
restOAuth2Scope.help=Space-separated list of OAuth2 scopes to request
restOAuth2Audience.help=Intended audience for the access token (aud claim or request parameter)
restOAuth2TokenName.help=Name of the JSON field in the token response that contains the access token (default: access_token)
restOAuth2ClientAuthenticationScheme.help=How the client credentials are sent to the token endpoint: basic (default) or post
restOAuth2Username.help=Resource owner username for the password grant type
restOAuth2Password.help=Resource owner password for the password grant type
restOAuth2Issuer.help=Issuer identifier used as the iss claim in JWT assertions and as the SAML issuer
restOAuth2KeyId.help=Key ID (kid) included in the JWT header to identify the signing key
restOAuth2Algorithm.help=JWT signing algorithm used for the assertion (e.g. RS256, ES256)
restOAuth2Subject.help=Subject (sub claim) of the JWT assertion; defaults to clientId if not set

restDigestUsername.help=Username for HTTP Digest authentication
restDigestPassword.help=Password for HTTP Digest authentication
restDigestAutoChallenge.help=When enabled, the connector automatically handles 401 Digest challenges
restDigestMaxRetries.help=Maximum number of Digest challenge retries before failing
restDigestPreemptiveAuth.help=Send Digest credentials on the first request without waiting for a 401 challenge
restDigestAlgorithmPreference.help=Preferred Digest algorithm (e.g. SHA-256, MD5)
restDigestStateCacheEnabled.help=Cache Digest nonce and opaque values across requests to reduce round-trips

restHawkId.help=Hawk credential ID issued by the server
restHawkKey.help=Shared secret used to compute the Hawk MAC signature
restHawkAlgorithm.help=HMAC algorithm used for signing: sha256 (default) or sha512
restHawkIncludePayloadHash.help=Include a hash of the request payload in the Hawk Authorization header
restHawkOffset.help=Clock offset in seconds applied to the timestamp in the Hawk header
restHawkExt.help=Application-specific data included in the Hawk ext attribute

restAwsAccessKey.help=AWS access key ID
restAwsSecretKey.help=AWS secret access key
restAwsSessionToken.help=Temporary session token for assumed-role or federated credentials
restAwsRegion.help=AWS region of the target service (e.g. us-east-1)
restAwsService.help=AWS service name used in the Signature scope (e.g. execute-api, s3)
restAwsSignatureVersion.help=AWS Signature version: 4 (default) or 2

restNtlmUsername.help=Windows username for NTLM authentication
restNtlmPassword.help=Windows password for NTLM authentication
restNtlmDomain.help=Windows domain or workgroup name
restNtlmWorkstation.help=Name of the client workstation sent in the NTLM negotiation
restNtlmVersion.help=NTLM protocol version: NTLMv1 or NTLMv2 (default)

